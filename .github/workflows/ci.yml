name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: trana
          POSTGRES_PASSWORD: trana1234
          POSTGRES_DB: trana
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Strip local java.home from gradle.properties
        run: sed -i '/org.gradle.java.home/d' gradle.properties

      - name: ktlint check
        run: ./gradlew ktlintCheck

      - name: detekt
        run: ./gradlew detekt

      - name: Test
        run: ./gradlew test
