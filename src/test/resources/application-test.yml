# 테스트 전용 설정 — CI + 로컬 테스트 공통
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/trana
    username: trana
    password: trana1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
trana:
  jwt:
    issuer: trana
    audience: trana-app
    secret: test-secret-do-not-use-in-prod-32bytes-minimum-length-required
    access-token-ttl: PT15M
    refresh-token-ttl: P1825D
  crypto:
    password: test-password-do-not-use-in-prod
    salt: deadbeefcafebabe1234567890abcdef
  identity:
    pass:
      key-info-base64: test-mok-key-info-base64-not-decrypted-in-tests
      key-info-password: test-mok-password
      mobile-ok-base-url: https://test.mobile-ok.example.com
      return-url: http://localhost/v1/identity/pass/return
  storage:
    s3:
      region: ap-northeast-2
      access-key: test-access-key
      secret-key: test-secret-key
  contract:
    storage:
      bucket: test-archive-bucket
      presigned-upload-ttl-minutes: 10
      max-attachment-size-bytes: 10485760
      presigned-get-ttl-minutes: 5
    pdf-archive:
      bucket: test-pdf-archive
      presigned-get-ttl-minutes: 10
    openai:
      api-key: test-openai-key
      base-url: https://test.openai.local/v1
      model: gpt-4o-mini
      prompt-version: v1
      consent-text-version: v1
      image-url-ttl-minutes: 5
      timeout-seconds: 60
    web:
      base-url: https://test.trana.app
  alimtalk:
    aligo:
      api-key: test-key
      user-id: test-id
      sender-key: test-sender-key
      sender: "01012345678"
      test-mode: true
      tpl-code:
        new-contract: UI_4032
        receiver-signed: UI_4033
        revision-requested: UI_4034
        completed: UI_4037
        dispute-reported: UI_PENDING_DISPUTE_REGISTRATION
        cancellation-requested: UI_PENDING_CANCELLATION_REGISTRATION
        guardian-contract-completed: UI_PENDING_GUARDIAN_COMPLETED
        emtitle-new-contract: "안전 거래 계약 서명 요청"
        emtitle-receiver-signed: "최종 서명 요청"
        emtitle-revision-requested: "안전 거래 계약 수정 요청"
        emtitle-completed: "안전 거래 계약 최종 완료"
        emtitle-guardian-contract-completed: "미성년 자녀 계약 체결 통보"
  fcm:
    service-account-base64: ""
  slack:
    webhook-url: https://hooks.slack.com/services/test-dummy
  dev:
    token-key: test-dummy

