# 테스트 전용 설정 — CI + 로컬 테스트 공통
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/trana
    username: trana
    password: trana1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration

trana:
  jwt:
    issuer: trana
    audience: trana-app
    secret: test-secret-do-not-use-in-prod-32bytes-minimum-length-required
    access-token-ttl: PT15M
    refresh-token-ttl: P30D
  crypto:
    password: test-password-do-not-use-in-prod
    salt: deadbeefcafebabe1234567890abcdef
  oauth:
    kakao:
      issuer: https://kauth.kakao.com
      client-id: test-kakao-client-id
      native-app-key: test-kakao-native-app-key
    google:
      issuer: https://accounts.google.com
      client-id: test-google-client-id
    apple:
      issuer: https://appleid.apple.com
      bundle-id: test-apple-bundle-id
      client-id: test-apple-services-id
      team-id: TESTTEAMID
      key-id: TESTKEYID01
      private-key: |
        -----BEGIN PRIVATE KEY-----
        TEST_PRIVATE_KEY_BODY
        -----END PRIVATE KEY-----
      android-package-name: com.trana.test
  kyc:
    ncp:
      id-card:
        invoke-url: https://test.example.com/ekyc/v1/test/test/id-card
        secret-key: test-id-card-secret
      face-compare:
        invoke-url: https://test.example.com/ekyc/v1/test/test/face-compare
        secret-key: test-face-secret
  storage:
    s3:
      bucket: test-bucket
      region: ap-northeast-2
      access-key: test-access-key
      secret-key: test-secret-key
  contract:
    storage:
      bucket: test-archive-bucket
      presigned-upload-ttl-minutes: 10
      max-attachment-size-bytes: 10485760
      presigned-get-ttl-minutes: 5
    pdf-archive:
      bucket: test-pdf-archive
      presigned-get-ttl-minutes: 10
    openai:
      api-key: test-openai-key
      base-url: https://test.openai.local/v1
      model: gpt-4o-mini
      prompt-version: v1
      consent-text-version: v1
      image-url-ttl-minutes: 5
      timeout-seconds: 60
    web:
      base-url: https://test.trana.app
  alimtalk:
    aligo:
      api-key: test-aligo-api-key
      user-id: test-aligo-user
      sender-key: test-aligo-sender-key
      sender: 0212345678
  fcm:
    service-account-base64: ""
  slack:
    webhook-url: https://hooks.slack.com/services/test-dummy

