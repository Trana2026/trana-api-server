spring:
  application:
    name: trana-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false
  mvc:
    problemdetails:
      enabled: true
  jpa:
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

springdoc:
  swagger-ui:
    tags-sorter: alpha
    display-request-duration: true
    filter: true
    persist-authorization: true

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  shutdown: graceful

trana:
  cors:
    allowed-origins:
      - http://localhost:3000
      - https://khedivial-instructive-thatcher.ngrok-free.dev
  guardian:
    web-base-url: ${TRANA_GUARDIAN_WEB_BASE_URL:http://localhost:3000}
