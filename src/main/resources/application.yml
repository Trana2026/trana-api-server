spring:
  application:
    name: trana-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false
  mvc:
    problemdetails:
      enabled: true
  jpa:
    open-in-view: false
  cache:
    type: caffeine
    cache-names:
      - activeTerms
    caffeine:
      spec: maximumSize=4,expireAfterWrite=10m
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

logging:
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(%5p) %clr([%X{requestId:-}]){faint} %clr([%X{method:-} %X{path:-}]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"

springdoc:
  swagger-ui:
    display-request-duration: true
    filter: true
    persist-authorization: true

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  shutdown: graceful

trana:
  cors:
    allowed-origins:
      - http://localhost:3000
  guardian:
    web-base-url: ${TRANA_GUARDIAN_WEB_BASE_URL:http://localhost:3000}
  dev:
    token-key: ${TRANA_DEV_TOKEN_KEY:}
  contract:
    web:
      base-url: ${TRANA_CONTRACT_WEB_BASE_URL}
  identity:
    pass:
      key-info-base64: ${TRANA_PASS_KEY_INFO_BASE64}
      key-info-password: ${TRANA_PASS_KEY_INFO_PASSWORD}
      return-url: ${TRANA_PASS_RETURN_URL}
      mobile-ok-base-url: ${TRANA_PASS_MOBILE_OK_BASE_URL}
  alimtalk:
    aligo:
      tpl-code:
        new-contract: UJ_2893
        receiver-signed: UJ_2897
        revision-requested: UJ_2905
        completed: UJ_2901
        dispute-reported: UI_PENDING_DISPUTE_REGISTRATION
        cancellation-requested: UI_PENDING_CANCELLATION_REGISTRATION
        guardian-contract-completed: UI_PENDING_GUARDIAN_COMPLETED
        emtitle-new-contract: "안전 거래 계약 서명 요청"
        emtitle-receiver-signed: "최종 서명 요청"
        emtitle-revision-requested: "안전 거래 계약 수정 요청"
        emtitle-completed: "안전 거래 계약 최종 완료"
        emtitle-guardian-contract-completed: "미성년 자녀 계약 체결 통보"
      test-mode: true
  slack:
    webhook-url: ${TRANA_SLACK_WEBHOOK_URL:}
