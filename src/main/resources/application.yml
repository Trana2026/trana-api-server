spring:
  application:
    name: trana-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false
  mvc:
    problemdetails:
      enabled: true
  jpa:
    open-in-view: false
  cache:
    type: caffeine
    cache-names:
      - activeTerms
    caffeine:
      spec: maximumSize=4,expireAfterWrite=10m
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

logging:
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(%5p) %clr([%X{requestId:-}]){faint} %clr([%X{method:-} %X{path:-}]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"

springdoc:
  swagger-ui:
    display-request-duration: true
    filter: true
    persist-authorization: true

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  shutdown: graceful

trana:
  cors:
    allowed-origins:
      - http://localhost:3000
  guardian:
    web-base-url: ${TRANA_GUARDIAN_WEB_BASE_URL:http://localhost:3000}
  dev:
    token-key: ${TRANA_DEV_TOKEN_KEY:}
  contract:
    web:
      base-url: ${TRANA_CONTRACT_WEB_BASE_URL}
  identity:
    face-match:
      adult-threshold: ${TRANA_IDENTITY_FACE_MATCH_ADULT_THRESHOLD:0.5}
      guardian-threshold: ${TRANA_IDENTITY_FACE_MATCH_GUARDIAN_THRESHOLD:0.35}
  alimtalk:
    aligo:
      tpl-code:
        new-contract: UI_4032
        receiver-signed: UI_4033
        revision-requested: UI_4034
        completed: UI_4037
      test-mode: false
