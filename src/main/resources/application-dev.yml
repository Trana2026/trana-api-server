spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate

trana:
  jwt:
    issuer: trana
    audience: trana-app
    secret: ${TRANA_JWT_SECRET}
    access-token-ttl: PT15M
    refresh-token-ttl: P30D
  crypto:
    password: ${TRANA_CRYPTO_PASSWORD}
    salt: ${TRANA_CRYPTO_SALT}
  oauth:
    kakao:
      issuer: https://kauth.kakao.com
      client-id: ${KAKAO_REST_API_KEY}
    google:
      issuer: https://accounts.google.com
      client-id: ${GOOGLE_CLIENT_ID}
  kyc:
    ncp:
      id-card:
        invoke-url: ${NCP_EKYC_IDCARD_INVOKE_URL}
        secret-key: ${NCP_EKYC_IDCARD_SECRET}
      face-compare:
        invoke-url: ${NCP_EKYC_FACE_INVOKE_URL}
        secret-key: ${NCP_EKYC_FACE_SECRET}
  storage:
    s3:
      bucket: ${TRANA_S3_BUCKET}
      region: ${TRANA_S3_REGION:ap-northeast-2}
      access-key: ${TRANA_S3_ACCESS_KEY}
      secret-key: ${TRANA_S3_SECRET_KEY}
  contract:
    storage:
      bucket: ${TRANA_CONTRACT_S3_BUCKET}
      presigned-upload-ttl-minutes: 10
      max-attachment-size-bytes: 10485760
      presigned-get-ttl-minutes: 5
    pdf-archive:
      bucket: ${TRANA_CONTRACT_PDF_S3_BUCKET}
      presigned-get-ttl-minutes: 10
    openai:
      api-key: ${TRANA_OPENAI_API_KEY}
      base-url: https://api.openai.com/v1
      model: gpt-4o-mini
      prompt-version: v1
      consent-text-version: v1
      image-url-ttl-minutes: 5
      timeout-seconds: 60
  cors:
    allowed-origins:
      - https://trana-web-guardian.vercel.app
      - http://localhost:3000
      - https://khedivial-instructive-thatcher.ngrok-free.dev
    allowed-origin-patterns:
      - https://trana-web-guardian-*.vercel.app
  guardian:
    web-base-url: https://trana-web-guardian.vercel.app

logging:
  level:
    root: INFO
    com.trana: DEBUG
    org.springframework.web: INFO
