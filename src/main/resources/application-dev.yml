spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate

trana:
  jwt:
    issuer: trana
    audience: trana-app
    secret: ${TRANA_JWT_SECRET}
    access-token-ttl: PT15M
    refresh-token-ttl: P1825D
  crypto:
    password: ${TRANA_CRYPTO_PASSWORD}
    salt: ${TRANA_CRYPTO_SALT}
  dev:
    token-key: ${TRANA_DEV_TOKEN_KEY}
  identity:
    pass:
      mobile-ok-base-url: https://scert.mobile-ok.com
      return-url: ${TRANA_PASS_RETURN_URL:https://dev-api.trana.kr/v1/identity/pass/return}
  storage:
    s3:
      bucket: ${TRANA_S3_BUCKET}
      region: ${TRANA_S3_REGION:ap-northeast-2}
      access-key: ${TRANA_S3_ACCESS_KEY}
      secret-key: ${TRANA_S3_SECRET_KEY}
  contract:
    storage:
      bucket: ${TRANA_CONTRACT_S3_BUCKET}
      presigned-upload-ttl-minutes: 10
      max-attachment-size-bytes: 10485760
      presigned-get-ttl-minutes: 5
    pdf-archive:
      bucket: ${TRANA_CONTRACT_PDF_S3_BUCKET}
      presigned-get-ttl-minutes: 10
    openai:
      api-key: ${TRANA_OPENAI_API_KEY}
      base-url: https://api.openai.com/v1
      model: gpt-4o-mini
      prompt-version: v1
      consent-text-version: v1
      image-url-ttl-minutes: 5
      timeout-seconds: 60
    web:
      base-url: ${TRANA_CONTRACT_WEB_BASE_URL:https://trana.app}
  cors:
    allowed-origins:
      - https://dev-kyc.trana.kr
      - http://localhost:3000
      - https://khedivial-instructive-thatcher.ngrok-free.dev
    allowed-origin-patterns:
      - https://trana-web-guardian-*.vercel.app
  guardian:
    web-base-url: https://dev-kyc.trana.kr
  alimtalk:
    aligo:
      api-key: ${TRANA_ALIGO_API_KEY}
      user-id: ${TRANA_ALIGO_USER_ID}
      sender-key: ${TRANA_ALIGO_SENDER_KEY}
      sender: ${TRANA_ALIGO_SENDER}
      test-mode: true
  fcm:
    service-account-base64: ${FIREBASE_SERVICE_ACCOUNT_BASE64:}
  slack:
    webhook-url: ${TRANA_SLACK_WEBHOOK_URL}

logging:
  level:
    root: INFO
    com.trana: DEBUG
    org.springframework.web: INFO
