# 로컬 개발 환경 설정
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/trana
    username: trana
    password: trana1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration

trana:
  jwt:
    issuer: trana
    audience: trana-app
    secret: dev-only-secret-do-not-use-in-prod-32bytes-minimum-length-required
    access-token-ttl: PT15M
    refresh-token-ttl: P30D
