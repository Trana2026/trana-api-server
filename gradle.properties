# 이 프로젝트 전용 JDK (시스템 JAVA_HOME과 분리)
# 다른 프로젝트가 Java 8을 쓰고 있어도 이 프로젝트는 항상 JDK 21로 빌드
# CI 는 sed 로 이 라인 제거 후 setup-java 가 세팅한 JDK 사용
org.gradle.java.home=C:/Users/jtoth/.jdks/temurin-21.0.11
# --- 성능 튜닝 (Gradle 9.4 공식 권장) ---
# daemon: 매 명령 사이 JVM 재사용 (Kotlin/Java compiler daemon warmup 재활용)
org.gradle.daemon=true
# parallel: 프로젝트 병렬 실행 (single module 이라 큰 효과 X, 무료 옵션)
org.gradle.parallel=true
# caching: local build cache — task input 동일 시 output 재사용 (재빌드 시간 대폭 절약)
org.gradle.caching=true
# JVM heap 2GB — Kotlin compiler + Spring Boot classpath 여유. file.encoding UTF-8 일관성
org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
